<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- ── Plexus mark (pentagon node network) centred at 28,28 r=20 ── -->
  <!-- Pentagon nodes at angles: -90°, -18°, 54°, 126°, 198° -->
  <!-- Node 0 top:        (28, 8)           -->
  <!-- Node 1 top-right:  (47.0, 21.8)      -->
  <!-- Node 2 bot-right:  (40.2, 42.2)      -->
  <!-- Node 3 bot-left:   (15.8, 42.2)      -->
  <!-- Node 4 top-left:   (9.0,  21.8)      -->

  <!-- Outer pentagon edges -->
  <line x1="28" y1="8"    x2="47.0" y2="21.8" stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.28" stroke-linecap="round"/>
  <line x1="47.0" y1="21.8" x2="40.2" y2="42.2" stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.28" stroke-linecap="round"/>
  <line x1="40.2" y1="42.2" x2="15.8" y2="42.2" stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.28" stroke-linecap="round"/>
  <line x1="15.8" y1="42.2" x2="9.0"  y2="21.8" stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.28" stroke-linecap="round"/>
  <line x1="9.0"  y1="21.8" x2="28"   y2="8"    stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.28" stroke-linecap="round"/>

  <!-- Spokes: center (28,28) to each node -->
  <line x1="28" y1="28" x2="28"   y2="8"    stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="47.0" y2="21.8" stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="40.2" y2="42.2" stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="15.8" y2="42.2" stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="9.0"  y2="21.8" stroke="#0D9488" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Skip-1 diagonals for depth -->
  <line x1="28"   y1="8"    x2="40.2" y2="42.2" stroke="#0D9488" stroke-width="1.0" stroke-opacity="0.15" stroke-linecap="round"/>
  <line x1="28"   y1="8"    x2="15.8" y2="42.2" stroke="#0D9488" stroke-width="1.0" stroke-opacity="0.15" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="28"   cy="8"    r="3.5" fill="#0D9488"/>
  <circle cx="47.0" cy="21.8" r="2.8" fill="#0D9488" fill-opacity="0.75"/>
  <circle cx="40.2" cy="42.2" r="2.8" fill="#0D9488" fill-opacity="0.75"/>
  <circle cx="15.8" cy="42.2" r="2.8" fill="#0D9488" fill-opacity="0.75"/>
  <circle cx="9.0"  cy="21.8" r="2.8" fill="#0D9488" fill-opacity="0.75"/>

  <!-- Center node -->
  <circle cx="28" cy="28" r="4.5" fill="#0D9488"/>
  <!-- Highlight -->
  <circle cx="26.5" cy="26.5" r="1.4" fill="white" fill-opacity="0.35"/>

  <!-- ── Wordmark ── -->
  <text
    x="64"
    y="36"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="22"
    letter-spacing="-0.4"
    fill="#1E293B"
  >Plexus<tspan fill="#0D9488">AI</tspan></text>
</svg>
