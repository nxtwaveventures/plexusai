name: Daily Blog

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8:00 AM IST every day
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Check secrets are set
        run: |
          echo "GROQ_API_KEY set: ${{ secrets.GROQ_API_KEY != '' }}"
          echo "VITE_SUPABASE_URL set: ${{ secrets.VITE_SUPABASE_URL != '' }}"
          echo "SUPABASE_SERVICE_KEY set: ${{ secrets.SUPABASE_SERVICE_KEY != '' }}"

      - name: Generate and publish blog post
        run: node scripts/generate-blog.mjs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
